version: '3.8'

services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: happy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always

  auth-service:
    build:
      context: ./auth-service
    restart: always
    depends_on:
      - postgres

  chat-service:
    build:
      context: ./chat-service
    restart: always
    depends_on:
      - redis

  media-service:
    build:
      context: ./media-service
    restart: always

  notification-service:
    build:
      context: ./notification-service
    restart: always

  api-gateway:
    build:
      context: ./api-gateway
    restart: always
    depends_on:
      - auth-service
      - chat-service
      - media-service
      - notification-service

volumes:
  postgres_data:
    driver: local